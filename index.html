<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoFNC • Financeiro Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.09); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.12); }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-8px); }
        .modal { animation: modalPop 0.3s ease; }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

<!-- Login -->
<div id="login-screen" class="fixed inset-0 bg-zinc-950 flex items-center justify-center z-50">
    <div class="glass rounded-3xl p-12 max-w-md w-full mx-4 text-center">
        <div class="mx-auto w-20 h-20 bg-gradient-to-br from-cyan-400 to-blue-500 rounded-3xl flex items-center justify-center text-5xl mb-6">💰</div>
        <h1 class="text-5xl font-bold">NeoFNC</h1>
        <p class="text-zinc-400 mt-2">Controle Financeiro Inteligente</p>
        <input id="senha" type="password" placeholder="Senha" class="mt-10 w-full bg-white/10 border border-white/20 rounded-3xl px-6 py-5 text-lg focus:border-cyan-400 outline-none">
        <button onclick="verificarSenha()" class="mt-8 w-full bg-gradient-to-r from-cyan-400 to-blue-500 text-zinc-950 font-semibold py-5 rounded-3xl">Entrar</button>
        <div id="login-erro" class="mt-4 text-red-400 text-sm"></div>
        <p class="text-xs text-zinc-500 mt-10">Senha: Vlg2023@</p>
    </div>
</div>

<div id="main-app" class="hidden min-h-screen flex">

    <!-- Sidebar -->
    <div class="w-72 bg-zinc-900 border-r border-white/10 p-6 flex flex-col">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-blue-500 rounded-2xl flex items-center justify-center text-3xl">💰</div>
            <h1 class="text-3xl font-bold">NeoFNC</h1>
        </div>
        <nav class="flex-1 space-y-1">
            <a onclick="navigate(0)" class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-white/10 nav-active"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
            <a onclick="navigate(1)" class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-white/10"><i class="fa-solid fa-plus"></i> Adicionar Transação</a>
            <a onclick="navigate(2)" class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-white/10"><i class="fa-solid fa-bank"></i> Bancos</a>
            <a onclick="navigate(9)" class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-white/10"><i class="fa-solid fa-brain"></i> Grok IA</a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-8 overflow-auto">
        <h2 id="page-title" class="text-4xl font-semibold mb-8">Dashboard</h2>

        <!-- DASHBOARD -->
        <div id="screen-0">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="glass card rounded-3xl p-6">
                    <p class="text-emerald-400 text-sm">Receitas</p>
                    <p id="receitas" class="text-5xl font-semibold mt-2">R$ 0</p>
                </div>
                <div class="glass card rounded-3xl p-6">
                    <p class="text-rose-400 text-sm">Despesas</p>
                    <p id="despesas" class="text-5xl font-semibold mt-2">R$ 0</p>
                </div>
                <div class="glass card rounded-3xl p-6">
                    <p class="text-cyan-400 text-sm">Saldo</p>
                    <p id="saldo" class="text-5xl font-semibold mt-2">R$ 0</p>
                </div>
                <div class="glass card rounded-3xl p-6">
                    <p class="text-violet-400 text-sm">Crypto</p>
                    <p id="crypto" class="text-5xl font-semibold mt-2">R$ 0</p>
                </div>
            </div>

            <div class="mt-10 grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="glass rounded-3xl p-6">
                    <h3 class="font-medium mb-4">Evolução do Saldo</h3>
                    <canvas id="lineChart" class="h-64"></canvas>
                </div>
                <div class="glass rounded-3xl p-6">
                    <h3 class="font-medium mb-4">Distribuição de Gastos</h3>
                    <canvas id="pieChart" class="h-64"></canvas>
                </div>
            </div>

            <div class="mt-10">
                <h3 class="font-medium mb-4">Últimas Transações</h3>
                <div id="ultimas-transacoes" class="glass rounded-3xl divide-y divide-white/10"></div>
            </div>
        </div>

        <!-- ADICIONAR TRANSAÇÃO -->
        <div id="screen-1" class="hidden max-w-lg mx-auto">
            <div class="glass rounded-3xl p-8">
                <h3 class="text-2xl font-semibold mb-6">Nova Transação</h3>
                <form id="form-transacao" onsubmit="addTransaction(event)">
                    <input id="descricao" type="text" placeholder="Descrição" class="w-full bg-white/10 border border-white/20 rounded-2xl px-5 py-4 mb-4" required>
                    <input id="valor" type="number" step="0.01" placeholder="Valor em R$" class="w-full bg-white/10 border border-white/20 rounded-2xl px-5 py-4 mb-4" required>
                    <select id="tipo" class="w-full bg-white/10 border border-white/20 rounded-2xl px-5 py-4 mb-4">
                        <option value="receita">Receita (+)</option>
                        <option value="despesa">Despesa (-)</option>
                    </select>
                    <button type="submit" class="w-full py-4 bg-gradient-to-r from-cyan-400 to-blue-500 text-zinc-950 font-semibold rounded-2xl">Adicionar Transação</button>
                </form>
            </div>
        </div>

        <!-- GROK IA -->
        <div id="screen-9" class="hidden flex flex-col h-[calc(100vh-140px)]">
            <h3 class="text-2xl font-semibold mb-4">Grok IA Financeira</h3>
            <div id="chat" class="flex-1 glass rounded-3xl p-6 overflow-auto mb-4"></div>
            <div class="flex gap-3">
                <input id="prompt" type="text" placeholder="Ex: Qual foi meu maior gasto este mês?" class="flex-1 bg-white/10 border border-white/20 rounded-3xl px-6 py-4 outline-none">
                <button onclick="sendToGrok()" class="bg-violet-600 hover:bg-violet-500 px-8 rounded-3xl font-medium">Enviar</button>
            </div>
        </div>
    </div>
</div>

<script>
// Configurações
const BACKEND_URL = "https://neofnc-grok-proxy.bernardesg723.workers.dev";
let transacoes = JSON.parse(localStorage.getItem('neofnc_transacoes')) || [];

// Login
function verificarSenha() {
    if (document.getElementById('senha').value === "Vlg2023@") {
        sessionStorage.setItem('logado', 'true');
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        initApp();
    } else {
        document.getElementById('login-erro').innerHTML = "Senha incorreta";
    }
}

// Navegação
function navigate(page) {
    document.querySelectorAll('[id^="screen-"]').forEach(s => s.classList.add('hidden'));
    document.getElementById(`screen-${page}`).classList.remove('hidden');
}

// Adicionar Transação
function addTransaction(e) {
    e.preventDefault();
    const descricao = document.getElementById('descricao').value.trim();
    const valor = parseFloat(document.getElementById('valor').value);
    const tipo = document.getElementById('tipo').value;

    if (!descricao || isNaN(valor)) {
        alert("Preencha todos os campos corretamente.");
        return;
    }

    transacoes.unshift({
        descricao,
        valor,
        tipo,
        data: new Date().toISOString()
    });

    localStorage.setItem('neofnc_transacoes', JSON.stringify(transacoes));
    updateDashboard();
    alert("Transação adicionada com sucesso!");
    e.target.reset();
    navigate(0);
}

// Atualizar Dashboard
function updateDashboard() {
    let receitas = 0, despesas = 0;
    transacoes.forEach(t => {
        if (t.tipo === "receita") receitas += t.valor;
        else despesas += t.valor;
    });
    const saldo = receitas - despesas;

    document.getElementById('receitas').textContent = `R$ ${receitas.toLocaleString('pt-BR')}`;
    document.getElementById('despesas').textContent = `R$ ${despesas.toLocaleString('pt-BR')}`;
    document.getElementById('saldo').textContent = `R$ ${saldo.toLocaleString('pt-BR')}`;

    // Últimas transações
    const container = document.getElementById('ultimas-transacoes');
    container.innerHTML = '';
    transacoes.slice(0, 6).forEach(t => {
        const div = document.createElement('div');
        div.className = 'flex justify-between items-center p-4 border-b border-white/10 last:border-none';
        div.innerHTML = `
            <div>
                <div class="font-medium">${t.descricao}</div>
                <div class="text-xs text-zinc-400">${new Date(t.data).toLocaleDateString('pt-BR')}</div>
            </div>
            <div class="${t.tipo === 'receita' ? 'text-emerald-400' : 'text-rose-400'} font-semibold">
                ${t.tipo === 'receita' ? '+' : '-'} R$ ${t.valor.toLocaleString('pt-BR')}
            </div>
        `;
        container.appendChild(div);
    });
}

// Grok IA
async function sendToGrok() {
    const input = document.getElementById('prompt');
    const question = input.value.trim();
    if (!question) return;

    addMessage(question, true);
    input.value = "";

    const thinking = addMessage("Grok está pensando...", false);

    try {
        const res = await fetch(BACKEND_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ messages: [{ role: "user", content: question }] })
        });
        const data = await res.json();
        document.getElementById(thinking).remove();
        addMessage(data.choices[0].message.content.replace(/\n/g, '<br>'), false);
    } catch (e) {
        document.getElementById(thinking).remove();
        addMessage("Erro ao conectar com Grok. Tente novamente.", false);
    }
}

function addMessage(text, isUser) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `chat-bubble flex ${isUser ? 'user justify-end' : 'grok'}`;
    div.innerHTML = `<div>${text}</div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div.id = 'msg-' + Date.now();
}

// Inicialização
function initApp() {
    updateDashboard();
    navigate(0);
}

window.onload = () => {
    if (sessionStorage.getItem('logado') === 'true') {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        initApp();
    }
};
</script>
</body>
</html>
